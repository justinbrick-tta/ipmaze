name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Lint controller crate
        run: cargo clippy -p ipmaze-controller --all-targets -- -D warnings

      - name: Run controller tests
        run: cargo test -p ipmaze-controller

      - name: Check CRD drift
        run: |
          cargo run -p ipmaze-controller --bin ipmaze-controller -- generate-crd > /tmp/cidrpolicies.ipmaze.k8s.justin.directory.yaml
          diff -u config/crd/cidrpolicies.ipmaze.k8s.justin.directory.yaml /tmp/cidrpolicies.ipmaze.k8s.justin.directory.yaml

  packaging:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Kustomize packaging
        run: |
          kubectl kustomize config > /tmp/ipmaze-install.yaml
          kubectl kustomize config/controller > /tmp/ipmaze-controller.yaml
          tmpdir=$(mktemp -d ./tmp.kustomize-XXXXXX)
          cat > "$tmpdir/kustomization.yaml" <<'EOF'
          apiVersion: kustomize.config.k8s.io/v1beta1
          kind: Kustomization
          namespace: ipmaze-custom-system
          resources:
            - ../config
          EOF
          kubectl kustomize "$tmpdir" > /tmp/ipmaze-install-custom-namespace.yaml
          rm -rf "$tmpdir"

      - name: Validate Helm chart
        run: |
          helm lint charts/ipmaze-controller
          helm template ipmaze-controller charts/ipmaze-controller --namespace ipmaze-system --include-crds > /tmp/ipmaze-chart.yaml
          helm template ipmaze-controller charts/ipmaze-controller --namespace custom-system --set namespace.name=custom-system --include-crds > /tmp/ipmaze-chart-custom.yaml

      - name: Validate multi-arch image build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          provenance: false
