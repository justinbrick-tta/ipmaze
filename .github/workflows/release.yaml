name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Derive release metadata
        id: meta
        run: |
          version="${GITHUB_REF_NAME#v}"
          IFS='.' read -r major minor patch <<EOF
          ${version}
          EOF
          if [[ -z "${major}" || -z "${minor}" ]]; then
            echo "Release tags must follow vX.Y or vX.Y.Z" >&2
            exit 1
          fi
          owner=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          chart_version=$(awk '/^version:/ { print $2; exit }' charts/ipmaze-controller/Chart.yaml)
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "major_minor=${major}.${minor}" >> "${GITHUB_OUTPUT}"
          echo "image=ghcr.io/${owner}/ipmaze-controller" >> "${GITHUB_OUTPUT}"
          echo "chart_registry=oci://ghcr.io/${owner}/charts" >> "${GITHUB_OUTPUT}"
          echo "chart_version=${chart_version}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: docker-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.meta.outputs.image }}
          tags: |
            type=raw,value=${{ steps.meta.outputs.version }}
            type=raw,value=${{ steps.meta.outputs.major_minor }}
            type=raw,value=latest

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: ${{ steps.docker-meta.outputs.tags }}
          labels: ${{ steps.docker-meta.outputs.labels }}

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Validate chart before publish
        run: |
          helm lint charts/ipmaze-controller
          helm template ipmaze-controller charts/ipmaze-controller --namespace ipmaze-system --include-crds > /tmp/ipmaze-chart.yaml

      - name: Log in Helm registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Package chart
        run: |
          mkdir -p dist
          helm package charts/ipmaze-controller \
            --destination dist \
            --version "${{ steps.meta.outputs.chart_version }}" \
            --app-version "${{ steps.meta.outputs.version }}"

      - name: Push OCI chart
        run: |
          helm push "dist/ipmaze-controller-${{ steps.meta.outputs.chart_version }}.tgz" "${{ steps.meta.outputs.chart_registry }}"
