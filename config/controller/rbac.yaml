apiVersion: v1
kind: ServiceAccount
metadata:
  name: ipmaze-controller
  namespace: ipmaze-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ipmaze-controller
rules:
  - apiGroups:
      - ipmaze.k8s.justin.directory
    resources:
      - cidrpolicies
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ipmaze.k8s.justin.directory
    resources:
      - cidrpolicies/status
    verbs:
      - get
      - patch
      - update
  - apiGroups:
      - networking.k8s.io
    resources:
      - networkpolicies
    verbs:
      - get
      - list
      - watch
      - create
      - patch
      - update
      - delete
  - apiGroups:
      - events.k8s.io
    resources:
      - events
    verbs:
      - create
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ipmaze-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ipmaze-controller
subjects:
  - kind: ServiceAccount
    name: ipmaze-controller
    namespace: ipmaze-system
