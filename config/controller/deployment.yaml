apiVersion: apps/v1
kind: Deployment
metadata:
  name: ipmaze-controller
  namespace: ipmaze-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ipmaze-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ipmaze-controller
    spec:
      serviceAccountName: ipmaze-controller
      containers:
        - name: controller
          image: REPLACE_IMAGE
          imagePullPolicy: IfNotPresent
          args:
            - run
            - --requeue-seconds
            - "300"
          env:
            - name: RUST_LOG
              value: info,ipmaze_controller=debug
            - name: CONTROLLER_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
