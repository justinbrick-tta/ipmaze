apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "ipmaze-controller.fullname" . }}
  labels:
    {{- include "ipmaze-controller.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - ipmaze.k8s.justin.directory
    resources:
      - cidrpolicies
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ipmaze.k8s.justin.directory
    resources:
      - cidrpolicies/status
    verbs:
      - get
      - patch
      - update
  - apiGroups:
      - networking.k8s.io
    resources:
      - networkpolicies
    verbs:
      - get
      - list
      - watch
      - create
      - patch
      - update
      - delete
  - apiGroups:
      - events.k8s.io
    resources:
      - events
    verbs:
      - create
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "ipmaze-controller.fullname" . }}
  labels:
    {{- include "ipmaze-controller.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "ipmaze-controller.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "ipmaze-controller.serviceAccountName" . }}
    namespace: {{ include "ipmaze-controller.targetNamespace" . }}
